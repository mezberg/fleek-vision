<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fleek Sort — Live</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; background:#000; color:#fff; font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
  #video { width:100%; height:100vh; object-fit:cover; display:block; }
  #overlay { position:fixed; inset:0; pointer-events:none; }
  #status { position:fixed; top:60px; left:12px; right:12px; padding:8px 14px; border-radius:20px;
            background:rgba(0,0,0,0.55); font-size:14px; text-align:center; transition:background .2s; }
  #status.settling { background:rgba(234,179,8,0.75); }
  #status.calling { background:rgba(59,130,246,0.75); }
  #card { position:fixed; left:12px; right:12px; bottom:16px; background:rgba(20,20,20,0.92);
          border-radius:16px; padding:16px; transform:translateY(140%); transition:transform .3s ease; z-index:6; }
  #card.show { transform:translateY(0); }
  #card.keep { background:rgba(21,94,52,0.95); }
  #card.discard { background:rgba(153,27,27,0.96); }
  #cVerdict { font-size:24px; font-weight:800; margin-bottom:4px; letter-spacing:0.5px; }
  #card h2 { margin:0 0 6px; font-size:20px; }
  #card .row { font-size:14px; opacity:0.85; margin:2px 0; }
  #card .value { font-weight:700; font-size:15px; margin-top:8px; }
  #flash { position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; }
  #flash.go { animation: flashAnim 0.25s ease; }
  @keyframes flashAnim { 0%{opacity:0.9;} 100%{opacity:0;} }
  #edge { position:fixed; inset:0; pointer-events:none; z-index:8; border:0 solid transparent; transition:border-width .08s ease; }
  #edge.keep { border:16px solid #22c55e; }
  #edge.discard { border:16px solid #ef4444; }
  #setup { position:fixed; inset:0; background:#111; display:flex; flex-direction:column;
           justify-content:center; align-items:center; padding:24px; z-index:10; }
  #setup h1 { font-size:22px; margin-bottom:16px; }
  #setup input { width:100%; max-width:360px; padding:14px; font-size:16px; border-radius:10px;
                 border:none; margin-bottom:14px; }
  #setup button { width:100%; max-width:360px; padding:14px; font-size:16px; border-radius:10px;
                  border:none; background:#3b82f6; color:#fff; font-weight:600; }
  #setup.hidden { display:none; }
  #pauseBtn { position:fixed; top:12px; left:12px;
              padding:10px 18px; font-size:15px; font-weight:600; border:none; border-radius:22px;
              background:rgba(255,255,255,0.92); color:#111; z-index:5; display:none; }
  #pauseBtn.show { display:block; }
  #pauseBtn.paused { background:rgba(59,130,246,0.95); color:#fff; }
  #badge { position:fixed; top:12px; right:12px; padding:10px 16px; font-size:15px; font-weight:600;
           border:none; border-radius:22px; background:rgba(0,0,0,0.6); color:#fff; z-index:5; display:none; }
  #badge.show { display:block; }
  #badge .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#22c55e; margin-right:6px; }
  #recalibBtn { position:fixed; top:12px; left:50%; transform:translateX(-50%);
                padding:10px 16px; font-size:14px; font-weight:600; border:none; border-radius:22px;
                background:rgba(0,0,0,0.6); color:#fff; z-index:5; display:none; }
  #recalibBtn.show { display:block; }
  #calib { position:fixed; inset:0; z-index:15; display:none; flex-direction:column;
           justify-content:center; align-items:center; padding:0 20px; pointer-events:none; }
  #calib.show { display:flex; }
  #calib .box { background:rgba(0,0,0,0.82); border-radius:16px; padding:22px; max-width:360px;
                width:100%; text-align:center; pointer-events:auto; }
  #calib .box p { margin:0 0 16px; font-size:15px; line-height:1.45; }
  #calib .box button { width:100%; padding:14px; font-size:16px; font-weight:700; border:none;
                       border-radius:10px; background:#22c55e; color:#04310f; }
  #history { position:fixed; inset:0; background:#0d0d0d; z-index:20; transform:translateY(100%);
             transition:transform .3s ease; display:flex; flex-direction:column; }
  #history.show { transform:translateY(0); }
  #history header { display:flex; align-items:center; justify-content:space-between;
                    padding:16px; border-bottom:1px solid rgba(255,255,255,0.1); }
  #history header h2 { margin:0; font-size:18px; }
  #histCounts { font-size:13px; font-weight:400; opacity:0.7; }
  #history header button { background:none; border:none; color:#fff; font-size:26px; line-height:1; }
  #histList { flex:1; overflow-y:auto; padding:8px 12px 24px; }
  #histList .empty { opacity:0.5; text-align:center; margin-top:40px; }
  .hItem { display:flex; gap:12px; padding:10px; margin-bottom:8px; border-radius:12px;
           background:rgba(255,255,255,0.06); align-items:center; }
  .hItem.keep { background:rgba(21,94,52,0.30); }
  .hItem.discard { background:rgba(153,27,27,0.32); }
  .hItem .thumbs { display:flex; gap:4px; flex:none; }
  .hItem .thumbs img { width:40px; height:56px; object-fit:cover; border-radius:6px; }
  .hItem .info { flex:1; min-width:0; }
  .hItem .info .t { font-weight:600; font-size:15px; }
  .hItem .info .s { font-size:13px; opacity:0.8; margin-top:2px; }
  .hItem .verdict { font-size:13px; font-weight:700; margin-top:4px; display:flex; align-items:center; gap:6px; }
  .hItem .verdict.keep { color:#4ade80; }
  .hItem .verdict.discard { color:#f87171; }
  .hItem .verdict .grade { display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:22px;
                           padding:0 5px; border-radius:6px; background:rgba(255,255,255,0.15); color:#fff; font-size:13px; }
  #cvOverlay { position:fixed; inset:0; width:100%; height:100vh; pointer-events:none; z-index:7; }
  #cvbadge { position:fixed; top:96px; left:50%; transform:translateX(-50%); z-index:5;
             font-size:11px; padding:4px 10px; border-radius:12px; background:rgba(0,0,0,0.5); opacity:0.8; }
</style>
</head>
<body>
  <div id="setup">
    <h1>🔑 Fleek Sort</h1>
    <input id="apiKeyInput" type="password" placeholder="Paste OpenRouter API key" autocomplete="off">
    <button id="startBtn">Start camera</button>
    <p style="margin-top:14px;font-size:13px;opacity:0.7;text-align:center;">🔊 Turn the ringer/silent switch ON so the keep/discard sounds play.</p>
  </div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="capCanvas" style="display:none"></canvas>
  <canvas id="diffCanvas" width="80" height="60" style="display:none"></canvas>
  <canvas id="cvCanvas" width="160" height="120" style="display:none"></canvas>
  <canvas id="cvOverlay"></canvas>
  <div id="flash"></div>
  <div id="edge"></div>
  <div id="status">starting camera…</div>
  <div id="cvbadge">OpenCV: loading…</div>
  <button id="pauseBtn">⏸ Pause</button>
  <button id="recalibBtn">⟲ Set empty table</button>
  <button id="badge"><span class="dot"></span><span id="badgeCount">0</span> items</button>
  <div id="calib">
    <div class="box">
      <p>📸 Point the camera at the <b>empty table</b>, then tap below to save it as the baseline.</p>
      <button id="setBaselineBtn">Set baseline</button>
    </div>
  </div>
  <div id="history">
    <header>
      <h2>Scanned items <span id="histCounts"></span></h2>
      <button id="histClose">×</button>
    </header>
    <div id="histList"><div class="empty">No items scanned yet.</div></div>
  </div>
  <div id="card">
    <div id="cVerdict"></div>
    <h2 id="cCategory"></h2>
    <div class="row" id="cGrade"></div>
    <div class="row" id="cPattern"></div>
    <div class="row" id="cBrand"></div>
    <div class="row value" id="cValue"></div>
  </div>

<script>
const video = document.getElementById('video');
const capCanvas = document.getElementById('capCanvas');
const diffCanvas = document.getElementById('diffCanvas');
const diffCtx = diffCanvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const card = document.getElementById('card');
const flashEl = document.getElementById('flash');

const MOTION_THRESH = 12;      // avg per-pixel diff below this = "still"
const STABLE_NEEDED = 8;       // consecutive still checks before firing (~1.2s)
const COOLDOWN_MS = 2500;
const CHECK_INTERVAL_MS = 150;
const PRESENCE_THRESH = 16;    // still frame this far from the empty table = an item is present
const DUP_THRESH = 14;          // still frame this close to last capture = same item, skip

let prevFrame = null;
let emptyBaseline = null;       // learned image of the empty table; the "nothing here" reference
let lastCapturedFrame = null;   // small frame of the last analyzed item (for dedup)
let stableCount = 0;
let cooling = false;
let processing = false;
let paused = false;
let armed = true;               // false after a capture until the table is cleared again
let apiKey = "";
const history = [];

let stage = 'IDLE';             // 'IDLE' (watching for side 1) | 'AWAIT_FLIP' (side 1 captured, waiting for side 2)
let side1Capture = null;        // { dataUrl, thumb } for the first side, held until side 2 is ready
let flipMotionSeen = false;     // true once motion has been seen since side 1 — proves an actual flip happened

const badge = document.getElementById('badge');
const badgeCount = document.getElementById('badgeCount');
const historyEl = document.getElementById('history');
const histList = document.getElementById('histList');
const histCounts = document.getElementById('histCounts');
const edge = document.getElementById('edge');
let keepCount = 0, discardCount = 0;

// Grade decides the verdict: A/B/C = keep, below C (D) = discard. Falls back to
// "C" (keep) if the model didn't return a usable grade.
function verdictOf(r) {
  let g = String(r.grade || "").trim().toUpperCase();
  if (!["A", "B", "C", "D"].includes(g)) g = "C";
  return { grade: g, action: g === "D" ? "discard" : "keep", isHigh: r.resale_value_signal === "high" };
}

badge.addEventListener('click', () => historyEl.classList.add('show'));
document.getElementById('histClose').addEventListener('click', () => historyEl.classList.remove('show'));

// avg per-pixel difference across R,G,B between two 80x60 frames.
// Using all three channels (not just red) catches items that contrast with the
// background in green/blue too — red-only missed those. Divided by 3 so the scale
// stays "average per-channel", keeping the existing thresholds valid.
function frameDiff(a, b) {
  let sum = 0;
  for (let i = 0; i < a.length; i += 4) {
    sum += Math.abs(a[i] - b[i]) + Math.abs(a[i + 1] - b[i + 1]) + Math.abs(a[i + 2] - b[i + 2]);
  }
  return sum / (a.length / 4) / 3;
}

// grab the current camera frame as an 80x60 sample
function grabFrame() {
  diffCtx.drawImage(video, 0, 0, 80, 60);
  return diffCtx.getImageData(0, 0, 80, 60).data;
}

// ===== OpenCV.js detection (EXPERIMENT) ============================================
// Presence via ADAPTIVE background subtraction (MOG2) + Canny edge-density, which is
// robust to camera auto-exposure / lighting drift (unlike diffing a frozen baseline).
// We extract the item's real CONTOUR (for the overlay and to mask the crop to the
// silhouette on a distinctive background before sending to the model).
const CVW = 160, CVH = 120;                 // detection resolution
const CV_MIN_AREA_FRAC = 0.04;              // blob must cover >= 4% of the frame to be an "item"
const CV_MAX_AREA_FRAC = 0.85;              // blob covering ~whole frame = lighting glitch, not an item
const CV_MOTION_MEAN = 6;                   // mean gray change below this = still
const BG_HISTORY = 500, BG_VARTHRESH = 40;  // MOG2 params
const BG_LEARN = 0.02;                      // background learning rate while idle-watching (absorbs drift)
const CANNY_LO = 40, CANNY_HI = 120;        // Canny edge thresholds
const EDGE_MARGIN = 4;                      // item region must exceed empty-table edge density by this
const MASK_BG = "#7f7f7f";                  // neutral gray behind the masked item — contrasts any color
const cvCanvas = document.getElementById('cvCanvas');
const cvCtx = cvCanvas.getContext('2d', { willReadFrequently: true });
const cvOverlay = document.getElementById('cvOverlay');
const cvOverlayCtx = cvOverlay.getContext('2d');
const cvbadge = document.getElementById('cvbadge');
cvOverlay.width = CVW; cvOverlay.height = CVH;   // internal res; CSS stretches to screen

let cvReady = false;
let cvCalibrated = false;
let bgSub = null;          // cv.BackgroundSubtractorMOG2 — the adaptive background model
let baseEdgeDensity = 0;   // mean Canny response of the empty table
let cvPrevGray = null;     // cv.Mat: previous grayscale frame (for stillness)
let lastRegion = null;     // { bbox, contour } of the last detection

function onOpenCvLoaded() {
  // opencv.js exposes cv in a few shapes depending on build — handle them all.
  if (typeof cv === 'undefined') { cvbadge.textContent = "OpenCV: failed to load"; return; }
  if (cv instanceof Promise) { cv.then(m => { window.cv = m; cvOnReady(); }); }
  else if (cv.Mat) { cvOnReady(); }
  else { cv['onRuntimeInitialized'] = cvOnReady; }
}
function cvOnReady() { cvReady = true; cvbadge.textContent = "OpenCV: ready"; }

function cvGrayscaleOfVideo() {
  cvCtx.drawImage(video, 0, 0, CVW, CVH);
  const src = cv.imread(cvCanvas);
  const gray = new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
  src.delete();
  return gray;
}

// (Re)build the adaptive background model from the current (empty) view.
function cvSetBaseline() {
  if (!cvReady || video.readyState < 2) return;
  if (bgSub) { bgSub.delete(); bgSub = null; }
  bgSub = new cv.BackgroundSubtractorMOG2(BG_HISTORY, BG_VARTHRESH, false);
  // prime the model with several frames of the empty table (high learning rate)
  for (let i = 0; i < 10; i++) {
    const g = cvGrayscaleOfVideo(); const m = new cv.Mat();
    bgSub.apply(g, m, 0.6); g.delete(); m.delete();
  }
  // remember how "edgy" the empty table is, so we can tell a real item apart from a light shift
  const g = cvGrayscaleOfVideo(); const e = new cv.Mat();
  cv.Canny(g, e, CANNY_LO, CANNY_HI); baseEdgeDensity = cv.mean(e)[0];
  g.delete(); e.delete();
  cvCalibrated = true;
}

// Returns { present, still, bbox, contour } (contour = array of {x,y} in CVW×CVH space).
function cvDetect() {
  if (!cvReady || video.readyState < 2) return null;
  if (!cvCalibrated) return { present: false, still: true, bbox: null, contour: null };
  const gray = cvGrayscaleOfVideo();

  let still = true;
  if (cvPrevGray) {
    const d = new cv.Mat();
    cv.absdiff(gray, cvPrevGray, d);
    still = cv.mean(d)[0] < CV_MOTION_MEAN;
    d.delete();
    cvPrevGray.delete();
  }
  cvPrevGray = gray.clone();

  // Adaptive background subtraction. Learn (absorb drift) only while idle-watching;
  // freeze learning once an item is present/locked so it isn't dissolved into the bg.
  const lr = (armed && stage === 'IDLE') ? BG_LEARN : 0;
  const fg = new cv.Mat();
  bgSub.apply(gray, fg, lr);
  cv.threshold(fg, fg, 200, 255, cv.THRESH_BINARY);   // keep hard foreground only
  const k = cv.Mat.ones(5, 5, cv.CV_8U);
  cv.morphologyEx(fg, fg, cv.MORPH_OPEN, k);
  cv.morphologyEx(fg, fg, cv.MORPH_CLOSE, k);

  let present = false, bbox = null, contour = null;
  const contours = new cv.MatVector();
  const hier = new cv.Mat();
  cv.findContours(fg, contours, hier, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
  let best = 0, bi = -1;
  for (let i = 0; i < contours.size(); i++) {
    const a = cv.contourArea(contours.get(i));
    if (a > best) { best = a; bi = i; }
  }
  const frame = CVW * CVH;
  if (bi >= 0 && best > CV_MIN_AREA_FRAC * frame && best < CV_MAX_AREA_FRAC * frame) {
    const r = cv.boundingRect(contours.get(bi));
    // Edge-density confirmation: a real item adds edges; a pure lighting change doesn't.
    const edges = new cv.Mat();
    cv.Canny(gray, edges, CANNY_LO, CANNY_HI);
    const roi = edges.roi(r);
    const dens = cv.mean(roi)[0];
    roi.delete(); edges.delete();
    if (dens > baseEdgeDensity + EDGE_MARGIN) {
      present = true;
      bbox = { x: r.x, y: r.y, w: r.width, h: r.height };
      const d = contours.get(bi).data32S;         // [x0,y0,x1,y1,...]
      contour = [];
      for (let i = 0; i < d.length; i += 2) contour.push({ x: d[i], y: d[i + 1] });
    }
  }
  contours.delete(); hier.delete(); fg.delete(); k.delete(); gray.delete();
  return { present, still, bbox, contour };
}

// Draw the item's real outline (contour polygon) on the overlay.
function drawOverlay(contour, colorState) {
  cvOverlayCtx.clearRect(0, 0, CVW, CVH);
  if (!contour || contour.length < 3) return;
  cvOverlayCtx.lineWidth = 2;
  cvOverlayCtx.strokeStyle = colorState === 'settling' ? '#eab308'
                           : colorState === 'ready' ? '#22c55e' : '#3b82f6';
  cvOverlayCtx.beginPath();
  contour.forEach((p, i) => i ? cvOverlayCtx.lineTo(p.x, p.y) : cvOverlayCtx.moveTo(p.x, p.y));
  cvOverlayCtx.closePath();
  cvOverlayCtx.stroke();
}

// Capture a full-res JPEG of just the item: crop to its bbox, then clip to the
// silhouette so everything outside the contour becomes a flat distinctive background.
function captureMasked(region) {
  const vw = video.videoWidth, vh = video.videoHeight;
  const kx = vw / CVW, ky = vh / CVH, pad = 0.15;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  const bbox = region && region.bbox;
  if (bbox) {
    sx = bbox.x * kx; sy = bbox.y * ky; sw = bbox.w * kx; sh = bbox.h * ky;
    sx = Math.max(0, sx - sw * pad); sy = Math.max(0, sy - sh * pad);
    sw = Math.min(vw - sx, sw * (1 + 2 * pad)); sh = Math.min(vh - sy, sh * (1 + 2 * pad));
  }
  capCanvas.width = Math.round(sw); capCanvas.height = Math.round(sh);
  const ctx = capCanvas.getContext('2d');
  ctx.fillStyle = MASK_BG;
  ctx.fillRect(0, 0, capCanvas.width, capCanvas.height);
  const pts = region && region.contour;
  if (pts && pts.length > 2) {
    ctx.save();
    ctx.beginPath();
    pts.forEach((p, i) => {
      const px = p.x * kx - sx, py = p.y * ky - sy;
      i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
    });
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, capCanvas.width, capCanvas.height);
    ctx.restore();
  } else {
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, capCanvas.width, capCanvas.height);
  }
  return { dataUrl: capCanvas.toDataURL('image/jpeg', 0.85), thumb: makeThumb() };
}
// ===================================================================================

const calibEl = document.getElementById('calib');
const recalibBtn = document.getElementById('recalibBtn');

// Open the explicit "point at the empty table" prompt; detection is suspended until set.
function startCalibration() {
  cvCalibrated = false;
  if (bgSub) { bgSub.delete(); bgSub = null; }
  lastRegion = null;
  armed = true;
  stableCount = 0;
  stage = 'IDLE';
  side1Capture = null;
  flipMotionSeen = false;
  calibEl.classList.add('show');
  statusEl.textContent = "calibrating — aim at the empty table";
  statusEl.className = "";
}

document.getElementById('setBaselineBtn').addEventListener('click', () => {
  if (video.readyState < 2) return;
  if (!cvReady) { statusEl.textContent = "OpenCV still loading — try again in a moment"; return; }
  cvSetBaseline();
  lastRegion = null;
  armed = true;
  stableCount = 0;
  stage = 'IDLE';
  side1Capture = null;
  flipMotionSeen = false;
  calibEl.classList.remove('show');
  statusEl.textContent = "✓ baseline set — place an item";
  statusEl.className = "";
});

recalibBtn.addEventListener('click', startCalibration);

const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  stableCount = 0;
  if (paused) {
    pauseBtn.textContent = "▶ Resume";
    pauseBtn.classList.add('paused');
    statusEl.textContent = "⏸ paused";
    statusEl.className = "";
  } else {
    pauseBtn.textContent = "⏸ Pause";
    pauseBtn.classList.remove('paused');
    statusEl.textContent = armed ? "watching for an item…" : "✓ scanned — remove item for next";
    statusEl.className = "";
  }
});

const setupEl = document.getElementById('setup');
const apiKeyInput = document.getElementById('apiKeyInput');
const startBtn = document.getElementById('startBtn');

const savedKey = localStorage.getItem('openrouter_key');
if (savedKey) apiKeyInput.value = savedKey;

startBtn.addEventListener('click', () => {
  apiKey = apiKeyInput.value.trim();
  if (!apiKey) { alert('Paste your OpenRouter API key first'); return; }
  localStorage.setItem('openrouter_key', apiKey);
  ensureAudio();                       // unlock sound within this user gesture (iOS)
  setupEl.classList.add('hidden');
  initCamera().catch(e => { statusEl.textContent = "camera error: " + e.message; });
});

async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  await video.play();
  pauseBtn.classList.add('show');
  badge.classList.add('show');
  recalibBtn.classList.add('show');
  startCalibration();
  requestAnimationFrame(loop);
  setInterval(checkMotion, CHECK_INTERVAL_MS);
}

// One shared AudioContext, unlocked on a user gesture (iOS keeps new contexts
// suspended until then, and won't play sound created inside timers otherwise).
let audioCtx = null;
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}

function tone(freq, startOffset, dur, type, peak) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + startOffset;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, t0);
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(peak || 0.3, t0 + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

// KEEP = rising chime · DISCARD = low buzzer · high value = sparkle · flip = quick up-blip
function keepSound()    { ensureAudio(); tone(659, 0, 0.16, "sine", 0.60);   tone(988, 0.15, 0.30, "sine", 0.60); }
function discardSound() { ensureAudio(); tone(196, 0, 0.22, "square", 0.45); tone(147, 0.20, 0.34, "square", 0.45); }
function highEmphasis() { ensureAudio(); tone(1319, 0, 0.16, "sine", 0.55);  tone(1319, 0.20, 0.22, "sine", 0.55); }
function flipCueBeep()  { ensureAudio(); tone(880, 0, 0.10, "sine", 0.50);   tone(990, 0.12, 0.12, "sine", 0.50); }

function checkMotion() {
  // Keep analyzing the scene at all times. We do NOT stop for an in-flight Gemini
  // call — we only avoid starting a second call (handled at the capture step below).
  if (paused || video.readyState < 2) return;

  const det = cvDetect();
  if (!det) return;                       // OpenCV not ready yet
  const { present, still, bbox, contour } = det;
  const region = { bbox, contour };
  if (present) lastRegion = region;

  // Not calibrated yet — the explicit calibration prompt (#calib) is showing.
  if (!cvCalibrated) { drawOverlay(null); return; }

  const overlayState = stage === 'AWAIT_FLIP' ? 'settling'
                     : (armed && present && still) ? 'settling' : 'ready';
  drawOverlay(present ? contour : null, overlayState);

  if (!armed) {
    // Locked after a scan. Re-arm when the item LEAVES (blob gone = table clear).
    // Presence is measured against the empty baseline, so a swapped-in item stays
    // "present" and won't wedge the state the way frame-similarity could.
    if (!present) {
      armed = true;
      stableCount = 0;
      statusEl.textContent = "watching for an item…";
      statusEl.className = "";
    } else {
      statusEl.textContent = "✓ scanned — remove item for next";
      statusEl.className = "";
    }
    return;
  }

  if (stage === 'AWAIT_FLIP') {
    if (!present) {
      // Item removed instead of flipped — abandon side 1 and go back to watching.
      stage = 'IDLE'; side1Capture = null; flipMotionSeen = false; stableCount = 0;
      statusEl.textContent = "watching for an item…"; statusEl.className = "";
    } else if (!still) {
      // Motion while an item is still present — this is the flip happening.
      flipMotionSeen = true; stableCount = 0;
      statusEl.textContent = "flip in progress…"; statusEl.className = "settling";
    } else if (!flipMotionSeen) {
      statusEl.textContent = "✓ side 1 captured — 🔄 now flip the item"; statusEl.className = "settling";
    } else {
      stableCount++;
      statusEl.textContent = `other side holding still… ${stableCount}/${STABLE_NEEDED}`;
      statusEl.className = "settling";
      if (stableCount >= STABLE_NEEDED) { stableCount = 0; captureSide2AndAnalyze(region); }
    }
    return;
  }

  if (!present) {
    stableCount = 0;
    statusEl.textContent = "watching for an item…";
    statusEl.className = "";
  } else if (!still) {
    stableCount = 0;
    statusEl.textContent = "item moving…";
    statusEl.className = "settling";
  } else {
    // Still AND an item-sized blob is present — settle, then scan.
    stableCount++;
    statusEl.textContent = `holding still… ${stableCount}/${STABLE_NEEDED}`;
    statusEl.className = "settling";
    if (stableCount >= STABLE_NEEDED) {
      if (processing) {
        // A previous analysis is still running — keep watching, don't call Gemini again yet.
        statusEl.textContent = "⏳ analyzing previous…";
        statusEl.className = "calling";
      } else {
        stableCount = 0;
        captureSide1(region);
      }
    }
  }
}

function loop() { requestAnimationFrame(loop); }

// Side 1: capture (masked to the detected item) and hold — no Gemini call yet.
function captureSide1(region) {
  side1Capture = captureMasked(region);

  stage = 'AWAIT_FLIP';
  flipMotionSeen = false;
  flashEl.classList.add('go');
  setTimeout(() => flashEl.classList.remove('go'), 300);
  flipCueBeep();
  statusEl.textContent = "✓ side 1 captured — 🔄 now flip the item";
  statusEl.className = "settling";
}

// Side 2: capture (masked), then send both photos to Gemini together for one decision.
async function captureSide2AndAnalyze(region) {
  processing = true;
  statusEl.textContent = "📸 analyzing both sides…";
  statusEl.className = "calling";
  flashEl.classList.add('go');
  setTimeout(() => flashEl.classList.remove('go'), 300);

  const cap2 = captureMasked(region);
  const side1 = side1Capture;

  // Reset the flip sequence now — a failed call means starting the sequence over,
  // same as the single-shot version's "leave it armed for a retry" behavior.
  stage = 'IDLE';
  side1Capture = null;
  flipMotionSeen = false;

  try {
    const result = await callGemini(side1.dataUrl, cap2.dataUrl);
    // Lock onto this item; re-arm happens when the blob leaves (presence-based).
    armed = false;
    addToHistory(result, side1.thumb, cap2.thumb);
    showCard(result);
  } catch (e) {
    statusEl.textContent = "error: " + e.message;
  }

  processing = false;
  // If still armed (e.g. the call errored), reset the prompt so it can try again.
  if (armed) { statusEl.textContent = "watching for an item…"; statusEl.className = ""; }
}

// A small JPEG thumbnail of the current capture, for the history list.
function makeThumb() {
  const w = 140, h = Math.round(w * capCanvas.height / capCanvas.width);
  const t = document.createElement('canvas');
  t.width = w; t.height = h;
  t.getContext('2d').drawImage(capCanvas, 0, 0, w, h);
  return t.toDataURL('image/jpeg', 0.6);
}

function addToHistory(r, thumbFront, thumbBack) {
  const v = verdictOf(r);
  history.unshift({ r, thumbFront, thumbBack, v });
  if (v.action === "keep") keepCount++; else discardCount++;
  badgeCount.textContent = history.length;
  histCounts.textContent = `(${keepCount} keep · ${discardCount} discard)`;

  if (history.length === 1) histList.innerHTML = "";
  const el = document.createElement('div');
  el.className = "hItem " + v.action;
  const brand = r.brand && r.brand !== "unknown" ? r.brand : "";
  const meta = [brand, r.pattern_color].filter(Boolean).join(" · ");
  const gradeChip = v.grade === "D" ? "✗" : v.grade;
  const verdictLabel = (v.action === "keep" ? "KEEP" : "DISCARD") + (v.isHigh ? " · ⭐" : "");
  el.innerHTML =
    `<div class="thumbs"><img src="${thumbFront}" alt=""><img src="${thumbBack}" alt=""></div>` +
    `<div class="info">` +
      `<div class="t">${escapeHtml(r.category || "item")}</div>` +
      `<div class="s">${escapeHtml(meta)}</div>` +
      `<div class="verdict ${v.action}"><span class="grade">${gradeChip}</span> ${verdictLabel}</div>` +
    `</div>`;
  histList.insertBefore(el, histList.firstChild);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));
}

const PROMPT = `You are looking at two photos of the SAME garment from a live camera feed above a charity donation intake table — the item was flipped between shots, so the first photo shows one side and the second shows the other. Consider flaws visible in EITHER photo. Using both photos together, identify:
- category
- grade: assign exactly ONE grade using this rubric:
    "A" = Almost new with light wear. Looks close to new with minimal wear; any marks are light and typically removable.
    "B" = Gently used. Light everyday wear with minor flaws that don't affect use — may include small stains, holes, or missing buttons/zips that are easy to repair.
    "C" = Visible wear with stains. Noticeable wear and visible flaws but still wearable as-is — larger stains, tears, or repairs needed.
    "D" = Below grade C. Not wearable as-is: heavy damage, large tears/holes, severe or widespread staining, or otherwise beyond simple repair.
- grade_reason: one short sentence justifying the grade (mention the specific flaws and which photo, or "no visible flaws").
- brand: only if a visible logo/tag is present in either photo, else "unknown"
- brand_evidence: what you saw and in which photo, or "none"
- pattern_color: short description
- resale_value_signal: "high", "medium", or "low" — "high" means this item shows signs a typical volunteer sorter would miss but a vintage/resale buyer would value: recognizable designer/premium brand, vintage construction, band/graphic tees, deadstock/new-with-tags condition, rare colorways, notable sports/collectible merchandise, or a label visible in either photo. Most ordinary donated clothing is "low".
- value_reasoning: one short sentence, or "none"

Return ONLY JSON, no markdown fences:
{"category":"...", "grade":"A|B|C|D", "grade_reason":"...", "brand":"...", "brand_evidence":"...", "pattern_color":"...", "resale_value_signal":"...", "value_reasoning":"..."}`;

async function callGemini(dataUrl1, dataUrl2) {
  const resp = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + apiKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "google/gemini-3.5-flash",
      messages: [{
        role: "user",
        content: [
          { type: "text", text: PROMPT },
          { type: "image_url", image_url: { url: dataUrl1 } },
          { type: "image_url", image_url: { url: dataUrl2 } }
        ]
      }]
    })
  });
  const body = await resp.json();
  if (body.error) throw new Error(body.error.message || JSON.stringify(body.error));
  const content = body.choices[0].message.content;
  const match = content.match(/\{[\s\S]*\}/);
  return JSON.parse(match[0]);
}

function showCard(r) {
  const v = verdictOf(r);
  const gradeLabel = v.grade === "D" ? "Below grade C" : ("Grade " + v.grade);
  document.getElementById('cVerdict').textContent = v.action === "keep" ? "✅ KEEP" : "🗑️ DISCARD";
  document.getElementById('cCategory').textContent = r.category || "item";
  document.getElementById('cGrade').textContent = gradeLabel + (r.grade_reason ? " — " + r.grade_reason : "");
  document.getElementById('cPattern').textContent = r.pattern_color || "";
  document.getElementById('cBrand').textContent = "Brand: " + (r.brand || "unknown");
  document.getElementById('cValue').textContent = v.isHigh ? ("⭐ HIGH VALUE — " + (r.value_reasoning || "")) : "";
  card.className = "show " + v.action;

  // audio — the primary hands-free signal, fired once after the second side
  if (v.action === "keep") { keepSound(); if (v.isHigh) setTimeout(highEmphasis, 420); }
  else discardSound();

  // glanceable full-screen colored border
  edge.className = v.action;
  setTimeout(() => { edge.className = ""; }, 1300);

  setTimeout(() => card.classList.remove('show'), 4500);
}
</script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvLoaded()"></script>
</body>
